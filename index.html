    <meta
      name="description"
      content="JS.KIM STUDIO Super Mario — 무료 웹 횡스크롤 게임. PC·모바일 터치 지원, 리더보드 TOP 20."
    />
    <title>Super Mario - Stage 1 | JS.KIM STUDIO</title>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3913568961670725"
      crossorigin="anonymous"
    ></script>

  <body>
    <div id="name-entry" class="name-entry">
      <div class="name-entry__wrap">
        <p class="name-entry__studio">JS.KIM STUDIO</p>
        <form id="name-entry-form" class="name-entry__panel">
          <h1 class="name-entry__title">Super Mario</h1>
          <p class="name-entry__desc">캐릭터와 이름을 선택하세요</p>
          <fieldset class="name-entry__characters-wrap">
            <legend class="name-entry__label">캐릭터 선택</legend>
            <div id="player-character-group" class="name-entry__characters" role="radiogroup" aria-label="캐릭터 선택">
              <label class="name-entry__char name-entry__char--boy name-entry__char--selected">
                <input type="radio" name="player-character" value="boy" checked />
                <span class="name-entry__char-figure name-entry__char-figure--boy" aria-hidden="true"></span>
                <span class="name-entry__char-name">남자아이</span>
              </label>
              <label class="name-entry__char name-entry__char--girl">
                <input type="radio" name="player-character" value="girl" />
                <span class="name-entry__char-figure name-entry__char-figure--girl" aria-hidden="true"></span>
                <span class="name-entry__char-name">여자아이</span>
              </label>
            </div>
          </fieldset>
          <input
          id="player-name"
          class="name-entry__input"
          type="text"
          maxlength="20"
          placeholder="플레이어 이름"
          autocomplete="nickname"
          enterkeyhint="go"
        />
        <p id="name-entry-error" class="name-entry__error" hidden></p>
        <button type="submit" class="name-entry__btn">START</button>
        </form>
        <div class="adsense-slot" aria-label="광고">
          <ins
            class="adsbygoogle"
            style="display: block; min-height: 90px"
            data-ad-client="ca-pub-3913568961670725"
            data-ad-format="auto"
            data-full-width-responsive="true"
          ></ins>
        </div>
        <nav class="site-footer" aria-label="사이트 정보">
          <a href="/about.html">소개</a>
          <a href="/privacy.html">개인정보처리방침</a>
          <a href="/terms.html">이용약관</a>
          <a href="/contact.html">문의하기</a>
        </nav>
      </div>
    </div>
    <div id="leaderboard-modal" class="leaderboard-modal" hidden aria-hidden="true">
      <div class="leaderboard-modal__backdrop" aria-hidden="true"></div>
      <div
        class="leaderboard-modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="leaderboard-title"
      >
        <h2 id="leaderboard-title" class="leaderboard-panel__title">🏆 TOP 20</h2>
        <p class="leaderboard-panel__subtitle">전체 플레이어 공통 순위</p>
        <ol id="leaderboard-list" class="leaderboard-panel__list"></ol>
        <p id="leaderboard-status" class="leaderboard-panel__status"></p>
        <button type="button" id="leaderboard-close" class="leaderboard-panel__close">
          확인
        </button>
      </div>
    </div>
    <button
      type="button"
      id="game-exit"
      class="game-exit"
      hidden
      aria-label="게임 종료"
      title="게임 종료"
    >
      ✕
    </button>
    <div id="touch-controls" class="touch-controls" hidden aria-hidden="true">
      <div class="touch-controls__move">
        <button id="btn-left" type="button" class="touch-controls__btn touch-controls__btn--move" aria-label="왼쪽">◀</button>
        <button id="btn-right" type="button" class="touch-controls__btn touch-controls__btn--move" aria-label="오른쪽">▶</button>
      </div>
      <button id="btn-jump" type="button" class="touch-controls__btn touch-controls__btn--jump" aria-label="점프">JUMP</button>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
