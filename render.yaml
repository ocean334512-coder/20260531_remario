databases:
  - name: mario-leaderboard-db
    databaseName: mario_leaderboard
    user: mario
    plan: free

services:
  - type: web
    name: mario-leaderboard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: mario-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mario-leaderboard-db
          property: connectionString
      - key: DATA_DIR
        value: /data
      - key: DATABASE_PATH
        value: /data/mario.db
      - key: CORS_ORIGINS
        value: http://127.0.0.1:5173,http://localhost:5173,https://20260531-remario.vercel.app,https://20260531-remario-git-main-ocean334512-coders-projects.vercel.app
