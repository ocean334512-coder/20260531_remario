databases:
  - name: mario-leaderboard-db
    databaseName: mario_leaderboard
    user: mario
    plan: free

services:
  - type: web
    name: mario-leaderboard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mario-leaderboard-db
          property: connectionString
      - key: CORS_ORIGINS
        value: http://127.0.0.1:5173,http://localhost:5173,https://20260531-remario.vercel.app
